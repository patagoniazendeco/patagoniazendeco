<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Patagonia Zendeco | Catálogo</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #171210;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    header {
      padding: 50px 20px;
      background: linear-gradient(
        180deg,
        #4d2f24 0%,
        #8b5a43 50%,
        #171210 100%
      );
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    header p {
      opacity: 0.85;
    }

    .catalogo {
      max-width: 900px;
      margin: auto;
      padding: 30px 15px 100px;
    }

    .mensaje {
      padding: 60px 20px;
      opacity: 0.7;
    }

    .whatsapp {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: #25D366;
      color: white;
      text-decoration: none;
      padding: 15px 20px;
      border-radius: 50px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

  <header>
    <h1>Patagonia Zendeco</h1>
    <p>Catálogo y lista de precios</p>
  </header>

  <main class="catalogo">
    <div class="mensaje">
      <h2>Próximamente nuestro catálogo</h2>
      <p>Estamos preparando nuestra colección.</p>
    </div>
  </main>

  <a class="whatsapp" href="#" aria-label="Contactar por WhatsApp">
    WhatsApp
  </a>

</body>
</html>
