<style>

  

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #110d0c;
      font-family: Arial, sans-serif;
    }

    /* =========================
       REVISTA
    ========================= */

    .revista {
      width: 100%;
      height: 100%;
      display: flex;

      overflow-x: auto;
      overflow-y: hidden;

      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;

      scrollbar-width: none;

      touch-action: pan-x;
    }

    .revista::-webkit-scrollbar {
      display: none;
    }

    /* =========================
       PÁGINAS
    ========================= */

    .pagina {
      min-width: 100%;
      width: 100%;
      height: 100%;

      flex-shrink: 0;

      scroll-snap-align: start;
      scroll-snap-stop: always;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .pagina img {
      width: 100%;
      height: 100%;

      object-fit: contain;

      user-select: none;
      -webkit-user-drag: none;
    }

    /* =========================
       FLECHAS
    ========================= */

    .flecha {
      position: fixed;

      top: 50%;
      transform: translateY(-50%);

      width: 48px;
      height: 48px;

      border: none;
      border-radius: 50%;

      background: rgba(0, 0, 0, 0.60);
      color: white;

      font-size: 28px;

      cursor: pointer;

      z-index: 10;

      transition:
        opacity 0.2s ease,
        background 0.2s ease;
    }

    .flecha:hover {
      background: rgba(0, 0, 0, 0.85);
    }

    .anterior {
      left: 15px;
    }

    .siguiente {
      right: 15px;
    }

    /* Ocultar flechas cuando no se pueden usar */

    .flecha.oculta {
      opacity: 0;
      pointer-events: none;
    }

    /* =========================
       CONTADOR
    ========================= */

    .contador {
      position: fixed;

      bottom: 15px;
      left: 50%;

      transform: translateX(-50%);

      background: rgba(0, 0, 0, 0.65);
      color: white;

      padding: 7px 14px;

      border-radius: 20px;

      font-size: 14px;

      z-index: 10;

      user-select: none;
    }

    /* =========================
       CELULAR
    ========================= */

    @media (max-width: 600px) {

      .flecha {
        width: 40px;
        height: 40px;

        font-size: 22px;
      }

      .anterior {
        left: 8px;
      }

      .siguiente {
        right: 8px;
      }

      .contador {
        bottom: 10px;
      }

    }

<body>


  <!-- =========================
       REVISTA
  ========================== -->

  <main
    class="revista"
    id="revista"
  ></main>


  <!-- =========================
       NAVEGACIÓN
  ========================== -->

  <button
    class="flecha anterior"
    id="anterior"
    aria-label="Página anterior"
  >
    ‹
  </button>


  <button
    class="flecha siguiente"
    id="siguiente"
    aria-label="Página siguiente"
  >
    ›
  </button>


  <!-- =========================
       CONTADOR
  ========================== -->

  <div
    class="contador"
    id="contador"
  >
    1 / 19
  </div>


  <script>

    /* =========================
       CONFIGURACIÓN
    ========================== */

    const TOTAL_PAGINAS = 19;

    const revista =
      document.getElementById("revista");

    const contador =
      document.getElementById("contador");

    const botonAnterior =
      document.getElementById("anterior");

    const botonSiguiente =
      document.getElementById("siguiente");

    let paginaActual = 0;


    /* =========================
       CREAR LAS 19 PÁGINAS
       AUTOMÁTICAMENTE
    ========================== */

    for (
      let numero = 0;
      numero < TOTAL_PAGINAS;
      numero++
    ) {

      const nombreArchivo =
        String(numero).padStart(2, "0")
        + ".jpg.png";


      const pagina =
        document.createElement("section");

      pagina.className = "pagina";


      const imagen =
        document.createElement("img");

      imagen.src = nombreArchivo;

      imagen.alt =
        numero === 0
          ? "Portada Patagonia Zendeco"
          : "Página " + numero;

      imagen.loading =
        numero <= 1
          ? "eager"
          : "lazy";

      imagen.draggable = false;


      pagina.appendChild(imagen);

      revista.appendChild(pagina);

    }


    /* =========================
       ACTUALIZAR INTERFAZ
    ========================== */

    function actualizarInterfaz() {

      contador.textContent =
        (paginaActual + 1)
        + " / "
        + TOTAL_PAGINAS;


      /* Ocultar flecha izquierda
         en la portada */

      if (paginaActual === 0) {

        botonAnterior.classList.add(
          "oculta"
        );

      } else {

        botonAnterior.classList.remove(
          "oculta"
        );

      }


      /* Ocultar flecha derecha
         en la última página */

      if (
        paginaActual ===
        TOTAL_PAGINAS - 1
      ) {

        botonSiguiente.classList.add(
          "oculta"
        );

      } else {

        botonSiguiente.classList.remove(
          "oculta"
        );

      }

    }


    /* =========================
       IR A UNA PÁGINA
    ========================== */

    function irAPagina(numero) {

      paginaActual = Math.max(
        0,
        Math.min(
          numero,
          TOTAL_PAGINAS - 1
        )
      );


      revista.scrollTo({

        left:
          paginaActual
          * revista.clientWidth,

        behavior: "smooth"

      });


      actualizarInterfaz();

    }


    /* =========================
       BOTONES
    ========================== */

    botonSiguiente.addEventListener(
      "click",
      () => {

        irAPagina(
          paginaActual + 1
        );

      }
    );


    botonAnterior.addEventListener(
      "click",
      () => {

        irAPagina(
          paginaActual - 1
        );

      }
    );


    /* =========================
       FLECHAS DEL TECLADO
    ========================== */

    document.addEventListener(
      "keydown",
      (evento) => {

        if (
          evento.key ===
          "ArrowRight"
        ) {

          irAPagina(
            paginaActual + 1
          );

        }


        if (
          evento.key ===
          "ArrowLeft"
        ) {

          irAPagina(
            paginaActual - 1
          );

        }

      }
    );


    /* =========================
       DESLIZAMIENTO MANUAL
    ========================== */

    let temporizadorScroll;


    revista.addEventListener(
      "scroll",
      () => {

        clearTimeout(
          temporizadorScroll
        );


        temporizadorScroll =
          setTimeout(
            () => {

              paginaActual =
                Math.round(

                  revista.scrollLeft
                  /
                  revista.clientWidth

                );


              actualizarInterfaz();

            },

            100

          );

      }
    );


    /* =========================
       CAMBIO DE TAMAÑO
    ========================== */

    window.addEventListener(
      "resize",
      () => {

        revista.scrollTo({

          left:
            paginaActual
            * revista.clientWidth,

          behavior: "auto"

        });

      }
    );


    /* =========================
       INICIO
    ========================== */

    actualizarInterfaz();


  </script>
